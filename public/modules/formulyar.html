<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEG KIP — ФОРМУЛЯР</title>
<style>
:root{--bg:#020817;--accent:#22d3ee;--green:#10b981;--line:rgba(34,211,238,.24);--text:#f8fafc;--muted:#9fb7c7;--panel:rgba(0,0,0,.42)}
*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
body:before{content:"";position:fixed;inset:0;z-index:-3;background:linear-gradient(90deg,rgba(2,8,23,.96),rgba(2,8,23,.72),rgba(2,8,23,.94)),radial-gradient(circle at 62% 18%,rgba(34,211,238,.18),transparent 34%),radial-gradient(circle at 20% 75%,rgba(16,185,129,.10),transparent 30%),url('https://images.unsplash.com/photo-1513828583688-c52646db42da?q=80&w=1800&auto=format&fit=crop');background-size:cover;background-position:center}
body:after{content:"";position:fixed;inset:0;z-index:-2;opacity:.20;background-image:linear-gradient(rgba(34,211,238,.12) 1px,transparent 1px),linear-gradient(90deg,rgba(34,211,238,.12) 1px,transparent 1px);background-size:44px 44px;mask-image:radial-gradient(circle at center,black 0%,transparent 80%)}
.app{max-width:1560px;margin:0 auto;padding:22px}.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;border:1px solid var(--line);border-radius:28px;background:rgba(0,0,0,.42);backdrop-filter:blur(18px);padding:18px 20px;margin-bottom:20px;box-shadow:0 18px 40px rgba(0,0,0,.25)}
.brand{display:flex;align-items:center;gap:14px}.logo{width:58px;height:58px;border-radius:18px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(34,211,238,.23),rgba(16,185,129,.18));border:1px solid rgba(34,211,238,.45);box-shadow:0 0 34px rgba(34,211,238,.16);font-weight:900;color:#eaffff}
h1{margin:0;font-size:28px;letter-spacing:.5px}.subtitle{margin:4px 0 0;color:#9eeaff;font-size:13px;letter-spacing:.5px}.source-pill{border:1px solid rgba(16,185,129,.35);color:#d1fae5;background:rgba(16,185,129,.08);border-radius:999px;padding:10px 14px;font-weight:700;white-space:nowrap}
.breadcrumb{display:flex;gap:8px;flex-wrap:wrap;align-items:center;color:#8fdff0;margin:0 0 18px;font-size:14px}.sep{color:#64748b}.pasport-header{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-top:14px;padding:18px;border:1px solid rgba(34,211,238,.18);border-radius:26px;background:rgba(0,0,0,.36);backdrop-filter:blur(14px)}.pasport-title{font-size:28px;font-weight:900}.action-btns{display:flex;gap:10px;flex-wrap:wrap}
.btn{border:1px solid rgba(34,211,238,.28);background:rgba(255,255,255,.045);color:#eafcff;padding:11px 15px;border-radius:16px;font-weight:800;cursor:pointer}.btn:hover{border-color:rgba(34,211,238,.75);color:#22d3ee}.btn-primary{background:linear-gradient(135deg,#22d3ee,#10b981);color:#001018;border:0}.btn-secondary{background:rgba(34,211,238,.08)}
.search-bar{display:grid;grid-template-columns:minmax(220px,1fr) 220px 220px;gap:12px;margin:18px 0;padding:16px;border-radius:24px;border:1px solid rgba(34,211,238,.18);background:rgba(0,0,0,.32)}.search-input,.filter-select{width:100%;border:1px solid rgba(34,211,238,.24);background:rgba(2,8,23,.82);color:white;border-radius:16px;padding:13px 14px;outline:none;font-weight:700}.search-input::placeholder{color:#7ea7b8}
.summary-row{display:flex;flex-wrap:wrap;gap:10px;margin:0 0 18px}.summary-chip{display:flex;align-items:center;gap:8px;border:1px solid rgba(34,211,238,.18);background:rgba(0,0,0,.35);border-radius:999px;padding:9px 12px;color:#dffaff}.chip-dot{width:10px;height:10px;border-radius:999px}.num{font-weight:900}.cards-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:18px}.instrument-card{position:relative;overflow:hidden;border-radius:26px;border:1px solid rgba(34,211,238,.22);background:linear-gradient(145deg,rgba(0,0,0,.58),rgba(6,24,42,.80));box-shadow:0 16px 36px rgba(0,0,0,.28);padding:18px;min-height:340px;display:flex;flex-direction:column;justify-content:space-between}.instrument-card:before{content:"";position:absolute;inset:0 0 auto 0;height:5px;background:var(--card-color)}.card-top{display:grid;grid-template-columns:1fr 66px 1fr;gap:10px;align-items:start}.pos-label{font-size:11px;color:#8fb9c8;letter-spacing:1px}.pos-badge{display:inline-flex;margin-top:5px;padding:9px 12px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);font-size:20px;font-weight:900;color:#fff}.brand-badge{display:inline-flex;max-width:100%;padding:8px 10px;border-radius:12px;color:#001018;font-weight:900;font-size:13px;word-break:break-word}.dev-icon{font-size:34px;text-align:center}.card-name{font-size:24px;line-height:1.2;font-weight:900;margin:18px 0 14px;color:#f8fafc;min-height:58px;white-space:pre-wrap}.info-grid{display:grid;gap:9px}.info-row{display:grid;grid-template-columns:122px minmax(0,1fr);gap:10px;align-items:start;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.075)}.info-label{font-size:12px;color:#91b5c4;text-transform:uppercase;letter-spacing:.5px}.info-value{font-weight:800;color:#eafcff;word-break:break-word;white-space:pre-wrap}.passport-link{display:inline-flex;justify-content:center;width:100%;margin-top:16px;border-radius:16px;padding:12px 14px;text-decoration:none;background:rgba(34,211,238,.10);border:1px solid rgba(34,211,238,.24);color:#dffaff;font-weight:900}.passport-link:hover{border-color:rgba(34,211,238,.75);color:#22d3ee}.empty-state{grid-column:1/-1;text-align:center;border:1px dashed rgba(34,211,238,.25);border-radius:28px;padding:46px;background:rgba(0,0,0,.32);color:#b7d2df}.footer-note{margin:22px 0 4px;color:#7fa5b6;font-size:13px;text-align:center}
@media(max-width:1180px){.cards-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:760px){.app{padding:14px}.topbar,.pasport-header{align-items:flex-start;flex-direction:column}.search-bar{grid-template-columns:1fr}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header class="topbar"><div class="brand"><div class="logo">SEG</div><div><h1>KIP Digital Platform</h1><div class="subtitle">ЎЛЧОВ ВОСИТАЛАРИ · ФОРМУЛЯР</div></div></div><div class="source-pill">Маълумот манбаи: КИП.xlsx</div></header>
<div class="breadcrumb"><span>Ўлчов воситалари</span><span class="sep">›</span><span id="crumb">Формуляр</span></div>
<section>
<div class="pasport-header"><div><div class="pasport-title" id="section-title">ФОРМУЛЯР</div><div style="color:var(--muted);font-size:13px;margin-top:5px">Барча асбоблар — <span id="total-count" style="color:var(--accent);font-weight:900">0</span> та</div></div><div class="action-btns"><button class="btn btn-secondary" onclick="toggleSearch()">🔍 Қидириш</button><button class="btn btn-primary" onclick="resetFilters()">♻️ Тозалаш</button></div></div>
<div class="search-bar" id="search-bar"><input class="search-input" id="search-input" type="text" placeholder="🔍 Завод рақами, асбоб номи, позиция бўйича қидириш..." oninput="filterCards()"><select class="filter-select" id="filter-brand" onchange="filterCards()"><option value="">Барча брендлар</option></select><select class="filter-select" id="filter-location" onchange="filterCards()"><option value="">Барча жойлар</option></select></div>
<div class="summary-row" id="summary-row"></div><div class="cards-grid" id="cards-grid"></div>
</section>
<div class="footer-note">SEG KIP · ушбу файл фақат ФОРМУЛЯР бўлими учун алоҳида HTML код.</div>
</div>
<script>
const DATA = [{"pos": "17", "name": "Дат. темп", "brand": "Метран", "serial": "2456815", "limit": "-50...+100°С", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 2456815"}, {"pos": "19", "name": "Дат. темп", "brand": "Метран", "serial": "2459096", "limit": "-50...+100°С", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 2459096"}, {"pos": "21", "name": "Дат. темп", "brand": "Метран", "serial": "2451368", "limit": "-50...+100°С", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 2451368"}, {"pos": "22", "name": "Маг. указ. уров", "brand": "ТЕМПУ", "serial": "0023-1-3", "limit": "0-1500 мм", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 0023-1-3"}, {"pos": "23", "name": "Маг. указ. уров", "brand": "ТЕМПУ", "serial": "2861-4-4", "limit": "0-1200 мм", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 2861-4-4"}, {"pos": "25", "name": "Уровнемер", "brand": "Vega", "serial": "64933806", "limit": "0-2800 мм", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 64933806"}, {"pos": "26", "name": "Уровнемер", "brand": "Vega", "serial": "64933807", "limit": "0-2800 мм", "location": "Цен. Аввал УППГ", "skv": "", "passport": "🔍 64933807"}, {"pos": "32", "name": "Дат. темп", "brand": "Полит", "serial": "2303551", "limit": "0-100°С", "location": "Аввал", "skv": "скв-1П", "passport": "🔍 2303551"}, {"pos": "44", "name": "Дат. темп", "brand": "Полит", "serial": "2401124", "limit": "0-100°С", "location": "Аввал", "skv": "скв-8П", "passport": "🔍 2401124"}, {"pos": "52", "name": "Дат. темп", "brand": "Полит", "serial": "2303552", "limit": "0-100°С", "location": "Аввал", "skv": "скв-11П", "passport": "🔍 2303552"}, {"pos": "67", "name": "Дат. темп", "brand": "Полит", "serial": "2303562", "limit": "0-100°С", "location": "Аввал", "skv": "скв-12П", "passport": "🔍 2303562"}, {"pos": "76", "name": "Дат. темп", "brand": "Полит", "serial": "2401126", "limit": "0-100°С", "location": "Аввал", "skv": "скв-30П", "passport": "🔍 2401126"}, {"pos": "87", "name": "Дат. темп", "brand": "Полит", "serial": "2303560", "limit": "0-100°С", "location": "Аввал", "skv": "скв-13П", "passport": "🔍 2303560"}, {"pos": "112", "name": "Дат. темп", "brand": "Полит", "serial": "2401125", "limit": "0-100°С", "location": "Аввал", "skv": "скв-19П", "passport": "🔍 2401125"}, {"pos": "142", "name": "Термопреоб", "brand": "Метран", "serial": "2576830", "limit": "-50...+100°С", "location": "УУГ ТЭС", "skv": "", "passport": "🔍 2576830"}, {"pos": "147", "name": "Термопреоб", "brand": "ROSEMOUNT", "serial": "23WETR...V306", "limit": "-50...+100°С", "location": "УУГ ФНПЗ", "skv": "", "passport": "🔍 23WETR...V306"}, {"pos": "211", "name": "Преоб. дав", "brand": "Овен", "serial": "7253...7765", "limit": "0-2.5 МПа", "location": "Хонкиз УПН", "skv": "", "passport": "🔍 7253...7765"}, {"pos": "213", "name": "Преоб. дав", "brand": "Овен", "serial": "7253...7758", "limit": "0-2.5 МПа", "location": "Хонкиз УПН", "skv": "", "passport": "🔍 7253...7758"}, {"pos": "225", "name": "ULTRAMER", "brand": "Quvvat", "serial": "0001151", "limit": "0-32", "location": "Хонкиз УПН", "skv": "", "passport": "🔍 0001151"}, {"pos": "226", "name": "ULTRAMER", "brand": "Quvvat", "serial": "0001072", "limit": "0-50", "location": "Хонкиз УПН", "skv": "", "passport": "🔍 0001072"}, {"pos": "280", "name": "СКЖ", "brand": "НТФС", "serial": "17474", "limit": "0-60 м3/ч", "location": "Кашкақир ", "skv": "", "passport": "🔍 17474"}, {"pos": "311", "name": "ULTRAMER", "brand": "Quvvat", "serial": "0001102", "limit": "0.5-70 м3/ч", "location": "Ворух УПН", "skv": "", "passport": "🔍 0001102"}, {"pos": "342", "name": "ULTRAMER", "brand": "Quvvat", "serial": "0001097", "limit": "0-50", "location": "Шурсув ", "skv": "", "passport": "🔍 0001097"}, {"pos": "383", "name": "СКЖ", "brand": "НТЭС", "serial": "17429", "limit": "0-60 м3/г", "location": "Ворух", "skv": "", "passport": "🔍 17429"}, {"pos": "384", "name": "СКЖ", "brand": "НТЭС", "serial": "17431", "limit": "0-60 м3/г", "location": "Ворух", "skv": "", "passport": "🔍 17431"}];
const TITLE = 'ФОРМУЛЯР';
const CRUMB = 'Формуляр';
function escapeHtml(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function brandColor(brand){const colors=['#22d3ee','#10b981','#f59e0b','#a78bfa','#fb7185','#38bdf8','#facc15'];let n=0;String(brand||'').split('').forEach(ch=>n+=ch.charCodeAt(0));return colors[n%colors.length];}
function getIcon(name){name=String(name||'').toLowerCase();if(name.includes('темп')||name.includes('термо'))return '🌡️';if(name.includes('уров'))return '📊';if(name.includes('дав')||name.includes('манометр')||name.includes('экм'))return '⏱️';if(name.includes('скж')||name.includes('ultramer'))return '〽️';return '⚙️';}
function driveLink(serial){const q=encodeURIComponent(String(serial||'').trim());return q?'https://drive.google.com/drive/search?q='+q:'#';}
function init(){document.getElementById('section-title').textContent=TITLE;document.getElementById('crumb').textContent=CRUMB;document.getElementById('total-count').textContent=DATA.length;fillFilters();renderSummary(DATA);renderCards(DATA);}
function fillFilters(){const brands=[...new Set(DATA.map(x=>x.brand).filter(Boolean))].sort();const locs=[...new Set(DATA.map(x=>x.location).filter(Boolean))].sort();document.getElementById('filter-brand').innerHTML='<option value="">Барча брендлар</option>'+brands.map(x=>`<option>${escapeHtml(x)}</option>`).join('');document.getElementById('filter-location').innerHTML='<option value="">Барча жойлар</option>'+locs.map(x=>`<option>${escapeHtml(x)}</option>`).join('');}
function filterCards(){const q=document.getElementById('search-input').value.toLowerCase();const b=document.getElementById('filter-brand').value;const l=document.getElementById('filter-location').value;const rows=DATA.filter(r=>{const text=[r.pos,r.name,r.brand,r.serial,r.limit,r.location,r.skv,r.passport].join(' ').toLowerCase();return (!q||text.includes(q))&&(!b||r.brand===b)&&(!l||r.location===l);});renderSummary(rows);renderCards(rows);}
function resetFilters(){document.getElementById('search-input').value='';document.getElementById('filter-brand').value='';document.getElementById('filter-location').value='';filterCards();}
function toggleSearch(){const el=document.getElementById('search-bar');el.style.display=el.style.display==='none'?'grid':'none';}
function renderSummary(rows){const brands=[...new Set(rows.map(x=>x.brand).filter(Boolean))].length;const locs=[...new Set(rows.map(x=>x.location).filter(Boolean))].length;document.getElementById('summary-row').innerHTML=`<div class="summary-chip"><span class="chip-dot" style="background:#22d3ee"></span>Кўриняпти: <span class="num">${rows.length}</span></div><div class="summary-chip"><span class="chip-dot" style="background:#10b981"></span>Брендлар: <span class="num">${brands}</span></div><div class="summary-chip"><span class="chip-dot" style="background:#f59e0b"></span>Жойлар: <span class="num">${locs}</span></div>`;}
function renderCards(rows){const grid=document.getElementById('cards-grid');if(!rows.length){grid.innerHTML='<div class="empty-state"><div style="font-size:50px">🔎</div><h3>Маълумот топилмади</h3><p>Қидириш ёки фильтрни ўзгартиринг.</p></div>';return;}grid.innerHTML=rows.map(r=>{const color=brandColor(r.brand);const link=driveLink(r.serial);return `<div class="instrument-card" style="--card-color:${color}"><div><div class="card-top"><div><div class="pos-label">ПОЗИЦИЯ</div><div class="pos-badge">${escapeHtml(r.pos||'—')}</div></div><div class="dev-icon">${getIcon(r.name)}</div><div style="text-align:right"><div class="brand-badge" style="background:${color}">${escapeHtml(r.brand||'—')}</div></div></div><div class="card-name">${escapeHtml(r.name||'—')}</div><div class="info-grid"><div class="info-row"><div class="info-label">Заводской номер</div><div class="info-value">${escapeHtml(r.serial||'')}</div></div><div class="info-row"><div class="info-label">Предел измерения</div><div class="info-value">${escapeHtml(r.limit||'')}</div></div><div class="info-row"><div class="info-label">Место установки</div><div class="info-value">${escapeHtml(r.location||'')}</div></div><div class="info-row"><div class="info-label">СКВ</div><div class="info-value">${escapeHtml(r.skv||'')}</div></div><div class="info-row"><div class="info-label">ПАСПОРТ</div><div class="info-value">${escapeHtml(r.passport||'')}</div></div></div></div><a class="passport-link" target="_blank" href="${link}">🔍 Google Drive қидириш</a></div>`;}).join('');}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
