name: SEG-KIP Platform CI

on:
  push:
    branches:
      - main
      - feature/multi-workspace-architecture
  pull_request:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package.json

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Syntax and unit tests
        run: npm run ci

      - name: Production dependency audit
        run: npm audit --omit=dev --audit-level=high
